proxy_http_version 1.1;

# Standard proxy headers
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
# Only the first proxy in the chain should set X-Forwarded-For to $remote_addr.
# If another reverse proxy (CloudFlare, AWS CloudFront, etc.) sits in front,
# change this to $proxy_add_x_forwarded_for so client IPs are preserved.
proxy_set_header X-Forwarded-For   $remote_addr;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Proto $scheme;

# WebSocket + keepalive — Connection is set via the map in nginx-stack.conf:
#   regular requests → ""       (enables upstream keepalive)
#   websocket requests → "upgrade"
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Buffering — allow large responses (reports, exports)
proxy_buffering on;
proxy_buffers 32 8k;
proxy_busy_buffers_size 64k;

# Generous timeouts for long-running Moqui operations (data imports, reports)
proxy_connect_timeout  30s;
proxy_read_timeout    300s;
proxy_send_timeout    300s;

underscores_in_headers on;
