user nginx;
worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logs
  access_log /var/log/nginx/access.log combined;
  error_log /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 75s;

  # Docker Swarm embedded DNS — re-resolve service VIPs every 10 seconds.
  # Required so nginx picks up changes when the moqui service is redeployed.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/xml text/xml image/svg+xml;

  # TLS
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # WebSocket / keepalive multiplexing.
  # When the client sends "Upgrade: websocket", forward it;
  # for regular requests set Connection: "" to enable upstream keepalive.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
  }

  # Load Moqui virtual host
  include /etc/nginx/conf.d/*.conf;
}
