# Upstream: Docker Swarm routes 'moqui:8080' through the service VIP,
# distributing requests across all healthy Moqui task replicas automatically.
# least_conn is evaluated per nginx worker; the Swarm mesh handles cross-task
# distribution transparently.
upstream moqui_upstream {
  least_conn;
  server moqui:8080 max_fails=5 fail_timeout=15s;
  keepalive 64;
  keepalive_requests 1000;
  keepalive_timeout 75s;
}

server {
  listen 80;
  server_name _;
  # Redirect all HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate     /run/secrets/moqui-cert.pem;
  ssl_certificate_key /run/secrets/moqui-key.pem;

  # Increase max upload size (file attachments, imports, etc.)
  client_max_body_size 64M;

  location / {
    proxy_pass http://moqui_upstream;
    include /etc/nginx/snippets/moqui-proxy.conf;
  }

  # Health check endpoint — bypass proxy, served by nginx itself.
  # Allows load balancers / monitoring to probe nginx without hitting Moqui.
  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
