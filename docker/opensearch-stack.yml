# A Docker Swarm stack for an OpenSearch cluster.
#
# Create the overlay network (optional, stack deploy will create it):
#     docker network create --driver=overlay --attachable searchnet
#
# Apply labels to nodes:
#     docker node update --label-add search_node1=true node1
#     docker node update --label-add search_node2=true node2
#     docker node update --label-add search_node3=true node3
#     docker node update --label-add search_dashboards=true node1
#
# Create bind mount directories on each node (run on EACH physical host):
#     sudo mkdir -p /data/opensearch/data /data/opensearch/snapshots
#     sudo chown -R 1000:1000 /data/opensearch   # opensearch runs as UID 1000
#
# Deploy:
#     docker stack deploy -c opensearch-stack.yml moqui-search
#
# Remove the stack:
#     docker stack rm moqui-search
#
# Print logs:
#     docker service logs moqui-search_moqui-search1 --tail 200
#     docker service logs moqui-search_moqui-search2 --tail 200
#     docker service logs moqui-search_moqui-search3 --tail 200
#
# Register snapshot repository (run once after cluster is up):
#     curl -X PUT "http://localhost:9200/_snapshot/local_backup" \
#       -H 'Content-Type: application/json' \
#       -d '{"type":"fs","settings":{"location":"/usr/share/opensearch/snapshots","compress":true}}'

networks:
  searchnet:
    driver: overlay
    attachable: true
  servernet: { external: true }

services:
  moqui-search1:
    image: opensearchproject/opensearch:2.19.4
    networks: [searchnet]
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      - cluster.name=moqui-search
      - node.name=moqui-search1
      - node.roles=["master","data","ingest"]
      - discovery.seed_hosts=moqui-search1,moqui-search2,moqui-search3
      - cluster.initial_master_nodes=moqui-search1,moqui-search2,moqui-search3
      - network.host=0.0.0.0
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - path.repo=/usr/share/opensearch/snapshots
    volumes:
      - type: bind
        source: /data/opensearch/data
        target: /usr/share/opensearch/data
      - type: bind
        source: /data/opensearch/snapshots
        target: /usr/share/opensearch/snapshots
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_node1 == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 1024M }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  moqui-search2:
    image: opensearchproject/opensearch:2.19.4
