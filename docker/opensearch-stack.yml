  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.4
    networks: [searchnet, servernet]
    environment:
      OPENSEARCH_HOSTS: '["http://moqui-search1:9200","http://moqui-search2:9200","http://moqui-search3:9200"]'
      SERVER_BASEPATH: ""
      SERVER_REWRITEBASEPATH: "false"
    ports:
      - target: 5601
        published: 5601
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      update_config: { parallelism: 1, delay: 10s, failure_action: rollback }
      rollback_config: { parallelism: 1, delay: 5s, order: stop-first }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.search_dashboards == true
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 512M }
