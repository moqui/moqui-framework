# =============================================================================
# gateway-mqtt.properties — production overrides for moqui-device-gateway
#
# Loaded via Docker Swarm config mounted at /deployments/config/
# SmallRye Config picks up all *.properties files in that directory.
#
# Create the Docker config before deploying:
#   docker config create device_gateway_config ./device-gateway/gateway-mqtt.properties
#
# Keys here override the defaults in application.properties.
# Only set what differs from the defaults (SEDA stubs used in dev mode).
# The gateway identity itself is supplied via GATEWAY_DEVICE_ID environment
# variable in Compose/Swarm, not through this properties file.
# =============================================================================

# ---------------------------------------------------------------------------
# MQTT read path: paho-mqtt5 consumer -> JSON -> PARAMETER_LOG / PARAMETER
#
# mqtt.read.topic is set in application.properties (default: iot/parameters/in).
# Override here only if the broker address or credentials differ.
# ---------------------------------------------------------------------------
mqtt.read.route.autoStartup=true
mqtt.read.consume.uri=paho-mqtt5:iot/parameters/in?brokerUrl=tcp://moqui-broker1:1883&clientId=gateway-in&userName=artemis&password=artemis

# Notify Moqui after each DB write (optional — disable if Moqui is not reachable)
mqtt.read.afterStore.enabled=true
mqtt.read.afterStore.uri=http://moqui-server:8080/rest/s1/mantle/device/DeviceGatewayServices/write/MqttReadDeviceRequest

# ---------------------------------------------------------------------------
# MQTT write path
#
# The publish endpoint is built at runtime from DeviceRequest.brokerUri stored
# in the DB — there is no publish.uri property here.
# Only the post-publish audit step is configurable.
# ---------------------------------------------------------------------------
# mqtt.write.afterPublish.enabled=true
# mqtt.write.afterPublish.uri=seda:mqtt-write-device-request-audit?waitForTaskToComplete=Never

# ---------------------------------------------------------------------------
# Recipe export: SFTP to PLC / industrial device
#
# Uncomment and fill in sftp.* values to enable SFTP transfer.
# ---------------------------------------------------------------------------
device.config.export.filename=recipe.txt
# file.transfer.uri=sftp:${sftp.user}@${sftp.host}:${sftp.port}${sftp.remote.dir}?privateKeyFile=/run/secrets/sftp_key
