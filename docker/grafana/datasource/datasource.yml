apiVersion: 1

# Grafana datasources for Docker Swarm production environment.
# Database: YugabyteDB (3-node cluster), Search: OpenSearch (3-node cluster).
# For local Compose datasources see datasource-compose.yml.

datasources:
  - name: moqui-database
    type: postgres
    # YugabyteDB YSQL is PostgreSQL-compatible; connect to node1 (load-balanced by YB driver internally)
    url: moqui-database1:5433
    user: moqui
    jsonData:
      database: "moqui"
      sslmode: "disable"
      # YugabyteDB reports PostgreSQL 11 compatibility
      postgresVersion: 1100
      timescaledb: false
    secureJsonData:
      password: "moqui"

  - name: moqui-search
    type: elasticsearch
    # Point to any one node; OpenSearch cluster handles internal routing
    url: http://moqui-search1:9200
    database: "[default_]YYYY.MM.DD"
    jsonData:
      esVersion: "7.10.0"
      timeField: "@timestamp"
      logMessageField: message
      logLevelField: level
